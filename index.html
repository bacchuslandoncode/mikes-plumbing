<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Mike's Plumbing Demo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!--
      Static duplicate of the Contact page form so Netlify's build-time bot
      can detect it. Netlify scans the deployed static HTML for forms; a
      client-rendered React form alone is invisible to that scan. This form
      is never shown to visitors (hidden attribute) and is not the form
      users interact with.
    -->
    <form name="contact-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="address" />
      <textarea name="issue"></textarea>
      <input type="text" name="urgency" />
      <input type="text" name="contactMethod" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
